apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: git-sat-backend-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/devlopharsh/git-sat-backend.git
    targetRevision: main
    path: deploy/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: git-sat-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
