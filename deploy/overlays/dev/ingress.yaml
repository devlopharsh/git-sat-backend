apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: git-sat-backend
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: git-sat-dev.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: git-sat-backend
                port:
                  number: 80
