spring.config.import=optional:file:.env[.properties]
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Values are read from environment or .env
auth.cookie.name=git-sat
auth.cookie.max-age-seconds=${AUTH_COOKIE_MAX_AGE_SECONDS:604800}
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
auth.token.secret=${AUTH_TOKEN_SECRET:}
auth.token.ttl-seconds=${AUTH_TOKEN_TTL_SECONDS:604800}
