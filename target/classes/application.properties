spring.application.name=git-sat
spring.config.import=optional:file:.env[.properties]
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/git-sat}
spring.data.mongodb.auto-index-creation=true

# Values are read from environment or .env
auth.cookie.name=git-sat
auth.cookie.max-age-seconds=${AUTH_COOKIE_MAX_AGE_SECONDS:604800}
auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
auth.token.secret=${AUTH_TOKEN_SECRET:}
auth.session-token.ttl-seconds=${AUTH_TOKEN_TTL_SECONDS:604800}
auth.access-token.ttl-seconds=${AUTH_ACCESS_TOKEN_TTL_SECONDS:900}
auth.refresh-token.ttl-seconds=${AUTH_REFRESH_TOKEN_TTL_SECONDS:2592000}
auth.device-code.ttl-seconds=${AUTH_DEVICE_CODE_TTL_SECONDS:600}
auth.device-code.interval-seconds=${AUTH_DEVICE_CODE_INTERVAL_SECONDS:5}
auth.device-code.verification-url=${AUTH_DEVICE_VERIFICATION_URL:http://localhost:8080/device}
auth.device-code.cleanup-interval-ms=${AUTH_DEVICE_CODE_CLEANUP_INTERVAL_MS:60000}

